    <script src="search_script.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link href="https://gitcdn.github.io/bootstrap-toggle/2.2.2/css/bootstrap-toggle.min.css" rel="stylesheet">
    <script src="https://gitcdn.github.io/bootstrap-toggle/2.2.2/js/bootstrap-toggle.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Fresca&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
      <!-- Header -->
      <nav class="navbar navbar-custom navbar-expand-lg navbar-fixed-top navbar-light smol_height">
          <a class="navbar-brand mb-0 h1" href="index.html">Quakey</a>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                  aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav mr-auto">
                  <li class="nav-item">
                      <a class="nav-link" href="index.html">maps</a>
                  </li>
                  <li class="nav-item">
                      <a class="nav-link" href="search.html">search info</a>
                  </li>
                  <li class="nav-item active">
                      <a class="nav-link" href="requestform.html">request maps</a>
                  </li>
              </ul>
          </div>
      </nav>

        <form>
                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Email">
                  </div>
                  <div class="form-group col-md-6">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Joe Gaucho">
                  </div>
                </div>
                <div class="form-group">
                  <label for="reqSummary">Request Summary</label>
                  <input type="text" class="form-control" id="reqSummary" placeholder="Ex: Tornado data for Kansas in GeoJSON format for personal project.">
                </div>
                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label for="inputState">State</label>
                    <input type="text" class="form-control" id="inputState">
                  </div>
                  <div class="form-group col-md-4">
                    <label for="inputType">Type</label>
                    <select id="inputType" class="form-control">
                      <option selected>JSON</option>
                      <option>GeoJSON</option>
                      <option>KML</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                        <label for="exampleFormControlTextarea1">Describe any special specifications for the requested data.</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                      </div>
                <button type="submit" class="btn btn-primary">Request</button>
              </form>

      <!-- Footer -->
      <nav class="navbar navbar-custom navbar-expand-lg smol_height my-0 pl-0">
          <a class="nav-link " href="manual.html">manual</a>
          <form class="form-inline ml-auto my-0 my-0">
              <div class="form-group my-0 pl-0">
                  <label class="mr-2 my-0 pl-0">night mode</label>
                  <label class="switch ">
                      <input type="checkbox" id="night_toggle" onclick="toggle_action()">
                      <span class="slider round"></span>
                  </label>
              </div>
          </form>
      </nav>


    
    </div>
  </div>

</html>
